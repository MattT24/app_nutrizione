<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Report Plicometria</title>
    <style>
        body { font-family: 'Helvetica', 'Arial', sans-serif; padding: 20px; color: #333; }
        h1 { color: #27ae60; border-bottom: 2px solid #27ae60; padding-bottom: 10px; }
        .header-info { margin-bottom: 30px; }
        .header-info p { margin: 5px 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #bdc3c7; padding: 12px; text-align: left; }
        th { background-color: #ecf0f1; color: #2c3e50; }
        .results-box { margin-top: 30px; padding: 15px; background-color: #e8f8f5; border-left: 5px solid #1abc9c; }
        .results-box p { margin: 8px 0; font-size: 16px; }
        .note { margin-top: 20px; font-style: italic; color: #7f8c8d; }
    </style>
</head>
<body>

    <h1>Analisi Plicometrica</h1>
    
    <div class="header-info">
        <p><strong>Cliente:</strong> <span th:text="${plicometria.cliente.nome + ' ' + plicometria.cliente.cognome}">Nome Cognome</span></p>
        <p><strong>Data Misurazione:</strong> <span th:text="${#temporals.format(plicometria.dataMisurazione, 'dd/MM/yyyy')}">data</span></p>
        <p><strong>Metodo Utilizzato:</strong> <span th:text="${plicometria.metodo}">metodo</span></p>
    </div>

    <table>
        <thead>
            <tr>
                <th>Plica</th>
                <th>Misurazione (mm)</th>
            </tr>
        </thead>
        <tbody>
            <tr th:if="${plicometria.tricipite != null}">
                <td>Tricipite</td>
                <td th:text="${plicometria.tricipite}"></td>
            </tr>
            <tr th:if="${plicometria.bicipite != null}">
                <td>Bicipite</td>
                <td th:text="${plicometria.bicipite}"></td>
            </tr>
            <tr th:if="${plicometria.sottoscapolare != null}">
                <td>Sottoscapolare</td>
                <td th:text="${plicometria.sottoscapolare}"></td>
            </tr>
            <tr th:if="${plicometria.sovrailiaca != null}">
                <td>Sovrailiaca</td>
                <td th:text="${plicometria.sovrailiaca}"></td>
            </tr>
            <tr th:if="${plicometria.addominale != null}">
                <td>Addominale</td>
                <td th:text="${plicometria.addominale}"></td>
            </tr>
            <tr th:if="${plicometria.coscia != null}">
                <td>Coscia</td>
                <td th:text="${plicometria.coscia}"></td>
            </tr>
            <tr th:if="${plicometria.pettorale != null}">
                <td>Pettorale</td>
                <td th:text="${plicometria.pettorale}"></td>
            </tr>
            <tr th:if="${plicometria.ascellare != null}">
                <td>Ascellare</td>
                <td th:text="${plicometria.ascellare}"></td>
            </tr>
            <tr th:if="${plicometria.polpaccio != null}">
                <td>Polpaccio</td>
                <td th:text="${plicometria.polpaccio}"></td>
            </tr>
        </tbody>
    </table>

    <div class="results-box">
        <h3>Risultati Calcolati</h3>
        <p><strong>Massa Grassa (%):</strong> <span th:text="${plicometria.percentualeMassaGrassa != null ? T(java.lang.String).format('%.2f', plicometria.percentualeMassaGrassa) + '%' : '-'}"></span></p>
        <p><strong>Massa Grassa (kg):</strong> <span th:text="${plicometria.massaGrassaKg != null ? T(java.lang.String).format('%.2f', plicometria.massaGrassaKg) + ' kg' : '-'}"></span></p>
        <p><strong>Massa Magra (kg):</strong> <span th:text="${plicometria.massaMagraKg != null ? T(java.lang.String).format('%.2f', plicometria.massaMagraKg) + ' kg' : '-'}"></span></p>
    </div>

    <div class="note" th:if="${plicometria.note != null && !plicometria.note.isEmpty()}">
        <p><strong>Note:</strong> <span th:text="${plicometria.note}"></span></p>
    </div>

</body>
</html>
